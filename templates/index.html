<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntax Checker for Arithmetic Expressions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="background">
        <div class="container">
            <div class="header">
                <i class="fas fa-calculator"></i>
                <h1>Syntax Checker</h1>
                <p>Validate your arithmetic expressions</p>
            </div>

            <form method="POST" class="checker-form">
                <div class="input-group">
                    <input type="text" name="expression" placeholder="Enter arithmetic expression..." value="{{ expression }}" required>
                    <button type="submit" class="check-btn">
                        <i class="fas fa-check"></i>
                        Check Syntax
                    </button>
                </div>
            </form>

            {% if result %}
                <div class="result-card {{ 'success' if 'Valid' in result else 'error' }}">
                    <div class="result-icon">
                        {% if 'Valid' in result %}
                            <i class="fas fa-check-circle"></i>
                        {% else %}
                            <i class="fas fa-exclamation-triangle"></i>
                        {% endif %}
                    </div>
                    <div class="result-text">{{ result }}</div>
                </div>
            {% endif %}

            {% if tokens %}
                <div class="tokens-card">
                    <h3><i class="fas fa-list"></i> Token Analysis</h3>
                    <div class="tokens-grid">
                        {% for token in tokens %}
                            <div class="token-item">
                                <span class="token-type">{{ token[0] }}</span>
                                <span class="token-value">{{ token[1] }}</span>
                            </div>
                        {% endfor %}
                    </div>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
